<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo List App</title>
	<link rel="stylesheet" href="styles.css?v=20260306-2">
	<link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">
	<script src="TweenMax.min.js" data-manual></script>
</head>
<body>
	<div class="container">
		<h2>Todo List</h2>
		<div class="storage-controls">
			<select id="storage-duration">
				<option value="1">1 day</option>
				<option value="7">7 days</option>
				<option value="30">30 days</option>
				<option value="90">90 days</option>
			</select>
			<button id="save-btn" type="button">Save</button>
			<button id="save-all-btn" type="button">Save All</button>
			<button id="remove-btn" type="button" class="remove-btn">Remove from Storage</button>
		</div>
		<form id="todo-form">
			<input type="text" id="todo-input" maxlength="200" placeholder="Add a new todo..." required />
			<button type="submit" id="add-btn">Add</button>
		</form>
		<div class="todo-header">
			<span>Description</span>
			<span>Date Created</span>
			<span>Date Modified</span>
			<span>Actions</span>
		</div>
		<ul id="todo-list"></ul>
	</div>
	<div id="name-modal-overlay" class="modal-overlay" aria-hidden="true">
		<div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="name-modal-title">
			<button id="name-modal-close" type="button" class="modal-close" aria-label="Close">✕</button>
			<h3 id="name-modal-title">Description</h3>
			<div id="name-modal-content" class="modal-content"></div>
		</div>
	</div>
	<script src="app.js?v=20260306-4"></script>
</body>
</html>
