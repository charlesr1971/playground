<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo List App</title>
	<link rel="stylesheet" href="styles.css?v=20260306-1">
</head>
<body>
	<div class="container">
		<h2>Todo List</h2>
		<div class="storage-controls">
			<select id="storage-duration">
				<option value="1">1 day</option>
				<option value="7">7 days</option>
				<option value="30">30 days</option>
				<option value="90">90 days</option>
			</select>
			<button id="save-btn" type="button">Save</button>
			<button id="save-all-btn" type="button">Save All</button>
			<button id="remove-btn" type="button" class="remove-btn">Remove from Storage</button>
		</div>
		<form id="todo-form">
			<input type="text" id="todo-input" placeholder="Add a new todo..." required />
			<button type="submit" id="add-btn">Add</button>
		</form>
		<div class="todo-header">
			<span>Name</span>
			<span>Date Created</span>
			<span>Date Modified</span>
			<span>Actions</span>
		</div>
		<ul id="todo-list"></ul>
	</div>
	<script src="app.js?v=20260306-3"></script>
</body>
</html>
